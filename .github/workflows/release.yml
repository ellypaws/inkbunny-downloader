name: Build And Release

on:
  pull_request:
  push:
    branches:
      - "dev"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_NAME: inkbunny-downloader

jobs:
  build-tui:
    name: TUI ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download
        shell: bash

      - name: Build TUI binary
        run: |
          set -euo pipefail
          export CGO_ENABLED=0
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"
          release_version="dev"
          build_commit=""
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          fi
          if [[ "${GITHUB_REF:-}" == "refs/heads/dev" ]]; then
            build_commit="${GITHUB_SHA::7}"
          fi
          ldflags="-s -w -X github.com/ellypaws/inkbunny/cmd/downloader/pkg/buildinfo.Version=${release_version} -X github.com/ellypaws/inkbunny/cmd/downloader/pkg/buildinfo.Commit=${build_commit}"

          output="${APP_NAME}-tui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output="${APP_NAME}-tui-windows${{ matrix.ext }}"
          fi
          go build -trimpath -ldflags="$ldflags" -o "$output" ./cmd/tui
        shell: bash

      - name: Upload TUI artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.goos == 'windows' && format('{0}-tui-windows', env.APP_NAME) || format('{0}-tui-{1}-{2}', env.APP_NAME, matrix.goos, matrix.goarch) }}
          path: ${{ matrix.goos == 'windows' && format('{0}-tui-windows{1}', env.APP_NAME, matrix.ext) || format('{0}-tui-{1}-{2}{3}', env.APP_NAME, matrix.goos, matrix.goarch, matrix.ext) }}
          if-no-files-found: error

  build-desktop:
    name: Desktop ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            platform: linux/amd64
            ext: ""
            use_upx: true
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform: windows/amd64
            ext: .exe
            use_upx: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -f -o Dpkg::Options::="--force-overwrite" -y --no-install-recommends \
            build-essential \
            gcc \
            pkg-config \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            upx
          sudo rm -rf /var/lib/apt/lists/*
        shell: bash

      - name: Download Go modules
        run: go mod download
        shell: bash

      - name: Resolve Wails CLI version
        id: wails-version
        run: |
          echo "version=$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2)" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ steps.wails-version.outputs.version }}
        shell: bash

      - name: Build frontend
        working-directory: app
        run: |
          bun install --frozen-lockfile
          bun run build
        shell: bash

      - name: Build desktop app
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          release_version="dev"
          build_commit=""
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          fi
          if [[ "${GITHUB_REF:-}" == "refs/heads/dev" ]]; then
            build_commit="${GITHUB_SHA::7}"
          fi

          output="${APP_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output="${APP_NAME}-windows${{ matrix.ext }}"
          fi
          nopackage_flag="-nopackage"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            nopackage_flag=""
          fi
          upx_flag=""
          if [ "${{ matrix.use_upx }}" = "true" ]; then
            upx_flag="-upx"
          fi

          wails build \
            -clean \
            -trimpath \
              -devtools \
            -ldflags "-X github.com/ellypaws/inkbunny/cmd/downloader/pkg/buildinfo.Version=${release_version} -X github.com/ellypaws/inkbunny/cmd/downloader/pkg/buildinfo.Commit=${build_commit}" \
            -m \
            $nopackage_flag \
            -s \
            -platform "${{ matrix.platform }}" \
            -o "$output" \
            $upx_flag
        shell: bash

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.goos == 'windows' && format('{0}-windows', env.APP_NAME) || format('{0}-{1}-{2}', env.APP_NAME, matrix.goos, matrix.goarch) }}
          path: ${{ matrix.goos == 'windows' && format('build/bin/{0}-windows{1}', env.APP_NAME, matrix.ext) || format('build/bin/{0}-{1}-{2}{3}', env.APP_NAME, matrix.goos, matrix.goarch, matrix.ext) }}
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/dev'
    needs:
      - build-tui
      - build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ env.APP_NAME }}-*
          merge-multiple: true
          path: release-assets

      - name: Resolve dev prerelease metadata
        if: github.ref == 'refs/heads/dev'
        id: dev-release
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create GitHub prerelease
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          tag_name: dev-${{ steps.dev-release.outputs.short_sha }}
          name: dev ${{ steps.dev-release.outputs.short_sha }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          body: Automated prerelease from the dev branch at commit ${{ github.sha }}.

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
